version: "3.9"

services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    command: npm run start:server
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
      args:
        - VITE_API_URL=http://localhost:5000/api
    ports:
      - "5174:3000"
    env_file:
      - ./apps/admin/.env

  client:
    build:
      context: .
      dockerfile: apps/client/Dockerfile
      args:
        - VITE_API_URL=http://localhost:5000/api
    ports:
      - "5173:3000"
    env_file:
      - ./apps/client/.env
