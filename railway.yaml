services:
  client:
    name: client
    source:
      root: .
    build:
      dockerfile: apps/client/Dockerfile
      args:
        VITE_API_URL: ${API_URL}
    deploy:
      healthcheckPath: /
    env:
      API_URL: ${API_URL}

  admin:
    name: admin
    source:
      root: .
    build:
      dockerfile: apps/admin/Dockerfile
      args:
        VITE_API_URL: ${API_URL}
    deploy:
      healthcheckPath: /
    env:
      API_URL: ${API_URL}

  api-server:
    name: api-server
    source:
      root: .
    build:
      dockerfile: server/Dockerfile
    deploy:
      healthcheckPath: /api/health
    env:
      PORT: 5000
      NODE_ENV: production
