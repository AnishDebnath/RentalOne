services:
  client:
    name: client
    source:
      directory: apps/client
    config:
      static:
        directory: dist
        index: index.html
        spa: true
    env:
      VITE_API_URL: ${API_URL}
      VITE_AUTH_APP_URL: ${CLIENT_URL}
      VITE_ADMIN_APP_URL: ${ADMIN_URL}

  admin:
    name: admin
    source:
      directory: apps/admin
    config:
      static:
        directory: dist
        index: index.html
        spa: true
    env:
      VITE_API_URL: ${API_URL}
      VITE_AUTH_APP_URL: ${CLIENT_URL}
      VITE_ADMIN_APP_URL: ${ADMIN_URL}

  api-server:
    name: api-server
    source:
      directory: server
    config:
      healthcheck: /api/health
    env:
      PORT: 5000
      NODE_ENV: production
